name: gtex-link

services:
  gtex-link:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: gtex-link-prod
    ports:
      - "${GTEX_LINK_HOST_PORT:-8765}:8000"
    env_file:
      - path: ../.env
        required: false
      - path: ../.env.docker
        required: false
    environment:
      GTEX_LINK_HOST: 0.0.0.0
      GTEX_LINK_PORT: 8000
      GTEX_LINK_TRANSPORT: unified
      GTEX_LINK_MCP_PATH: /mcp
      GTEX_LINK_LOG_LEVEL: INFO
      GTEX_LINK_LOG_FORMAT: json
    command: ["gtex-link", "serve", "--transport", "unified", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    # Container & Deployment Hardening Standard v1: the base compose carries the
    # same hardening as the prod/npm overlays so running it directly is still safe.
    # The prod overlay inherits these (Compose appends list fields across -f
    # overlays, so re-declaring tmpfs/security_opt/cap_drop there would duplicate
    # them); the base file is the single source of those controls.
    read_only: true
    tmpfs:
      - /tmp/gtex-link:rw,noexec,nosuid,size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    init: true
    pids_limit: 256
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
          pids: 256
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - gtex-network

networks:
  gtex-network:
    driver: bridge
