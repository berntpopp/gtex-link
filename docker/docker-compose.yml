name: gtex-link

services:
  gtex-link:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: gtex-link-prod
    ports:
      - "${GTEX_LINK_HOST_PORT:-8765}:8000"
    env_file:
      - path: ../.env
        required: false
      - path: ../.env.docker
        required: false
    environment:
      GTEX_LINK_HOST: 0.0.0.0
      GTEX_LINK_PORT: 8000
      GTEX_LINK_TRANSPORT: unified
      GTEX_LINK_MCP_PATH: /mcp
      GTEX_LINK_LOG_LEVEL: INFO
      GTEX_LINK_LOG_FORMAT: json
    command: ["gtex-link", "server", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - gtex-network

networks:
  gtex-network:
    driver: bridge
