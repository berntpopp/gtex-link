name: gtex-link

services:
  gtex-link:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: gtex-link-prod
    # Dev/local only — loopback-bound (127.0.0.1) so copying this file to a
    # server never publishes the unauthenticated backend on the public IP
    # (Docker would otherwise bind 0.0.0.0 and bypass the host firewall).
    # Production fronts the container with a reverse proxy via the prod/npm
    # overlays (ports: !reset []). Backends are unauthenticated by design.
    ports:
      - "127.0.0.1:${GTEX_LINK_HOST_PORT:-8765}:8000"
    env_file:
      - path: ../.env
        required: false
      - path: ../.env.docker
        required: false
    environment:
      GTEX_LINK_HOST: 0.0.0.0
      GTEX_LINK_PORT: 8000
      GTEX_LINK_TRANSPORT: unified
      GTEX_LINK_MCP_PATH: /mcp
      GTEX_LINK_ALLOWED_HOSTS: '["localhost","127.0.0.1","::1"]'
      GTEX_LINK_ALLOWED_ORIGINS: '[]'
      GTEX_LINK_LOG_LEVEL: INFO
      GTEX_LINK_LOG_FORMAT: json
    command: ["gtex-link", "serve", "--transport", "unified", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: localhost", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    # Container & Deployment Hardening Standard v1: this base file is the single
    # source of the tmpfs/security_opt/cap_drop controls. The prod/npm overlays
    # inherit them (Compose appends list fields across -f overlays, so
    # re-declaring them there would duplicate them). The base file is dev/local
    # only and loopback-bound (see the ports stanza above); it is NOT for direct
    # server deployment — production fronts the backend with a reverse proxy.
    read_only: true
    tmpfs:
      - /tmp/gtex-link:rw,noexec,nosuid,size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    init: true
    pids_limit: 256
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
          pids: 256
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - gtex-network

networks:
  gtex-network:
    driver: bridge
