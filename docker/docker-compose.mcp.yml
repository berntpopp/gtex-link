name: gtex-link-mcp

services:
  # MCP HTTP server only
  gtex-link-mcp-http:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: gtex-link-mcp-http
    ports:
      - "8001:8001"
    environment:
      - GTEX_LINK_HOST=0.0.0.0
      - GTEX_LINK_MCP_PORT=8001
      - GTEX_LINK_TRANSPORT_MODE=streamable-http
      - GTEX_LINK_MCP_PATH=/mcp
      - GTEX_LINK_LOG_LEVEL=INFO
      - GTEX_LINK_LOG_FORMAT=json
    command: ["/app/.venv/bin/python", "mcp_http_server.py"]
    healthcheck:
      # MCP Streamable HTTP requires session-aware POSTs; GET /mcp returns 406 by spec.
      # Probe the TCP listener instead — confirms the server is bound and accepting.
      test:
        - CMD-SHELL
        - python -c "import socket; socket.create_connection(('127.0.0.1', 8001), 2).close()" || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - gtex-mcp-network

networks:
  gtex-mcp-network:
    driver: bridge
