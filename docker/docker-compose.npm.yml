name: gtex-link-npm

services:
  gtex_link:
    # Deploy pulls the released, attested image; it never builds from source.
    # Pin a digest, not a tag: there is no `latest`, and only a digest is immutable.
    image: ${GTEX_LINK_IMAGE:?Set GTEX_LINK_IMAGE to ghcr.io/berntpopp/gtex-link@sha256:<digest>}
    pull_policy: missing
    container_name: gtex-link-npm
    # NO direct ports exposed - NPM handles all routing.
    # Unified server: FastAPI on / and MCP on /mcp via the same port.
    expose:
      - "8000"
    environment:
      - GTEX_LINK_HOST=0.0.0.0
      - GTEX_LINK_PORT=8000
      - GTEX_LINK_TRANSPORT=unified
      - GTEX_LINK_MCP_PATH=/mcp
      - GTEX_LINK_ALLOWED_HOSTS=["localhost","127.0.0.1","::1","gtex-link.genefoundry.org"]
      - GTEX_LINK_ALLOWED_ORIGINS=["https://gtex-link.genefoundry.org"]
      - GTEX_LINK_LOG_LEVEL=${LOG_LEVEL_API:-INFO}
      - GTEX_LINK_LOG_FORMAT=json
      - GTEX_LINK_RELOAD=false
      # Nested settings groups take the `__` delimiter; the single-underscore
      # spelling used here previously was silently ignored.
      - GTEX_LINK_API__RATE_LIMIT_PER_SECOND=${GTEX_API_RATE_LIMIT:-5.0}
      - GTEX_LINK_CACHE__SIZE=${GTEX_CACHE_SIZE:-1000}
      - GTEX_LINK_CACHE__TTL=${GTEX_CACHE_TTL:-3600}
      # CORS configuration for production
      - GTEX_LINK_CORS_ORIGINS=["https://gtex-link.genefoundry.org"]
      - GTEX_LINK_CORS_ALLOW_CREDENTIALS=false
    # env_file is specified via --env-file flag for consistency with phentrieve
    command: ["gtex-link", "serve", "--transport", "unified", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: localhost", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp/gtex-link:rw,noexec,nosuid,size=64m,mode=1777
    networks:
      - gtex_link_internal_net
      - npm_proxy_network
    # Resource limits (optional, can be customized via environment)
    deploy:
      resources:
        limits:
          memory: ${GTEX_API_MEMORY_LIMIT:-512m}
          cpus: ${GTEX_API_CPU_LIMIT:-0.5}
          pids: 256
        reservations:
          memory: 128m
          cpus: 0.25
    # Production logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=gtex-link,environment=production,proxy=npm"
    # Security options
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    init: true

networks:
  gtex_link_internal_net:
    driver: bridge
    name: gtex_link_internal_net
  npm_proxy_network:
    external: true
    name: ${NPM_SHARED_NETWORK_NAME:-npm_default}
