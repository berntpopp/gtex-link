# Production docker-compose override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  gtex-link:
    # Production-specific environment variables
    environment:
      GTEX_LINK_TRANSPORT: unified
      GTEX_LINK_LOG_LEVEL: INFO
      GTEX_LINK_LOG_FORMAT: json
      GTEX_LINK_RELOAD: "false"
      GTEX_LINK_ALLOWED_HOSTS: '["localhost","127.0.0.1","::1","gtex-link.genefoundry.org"]'
      GTEX_LINK_ALLOWED_ORIGINS: '["https://gtex-link.genefoundry.org"]'
      GTEX_LINK_CORS_ORIGINS: '["https://gtex-link.genefoundry.org"]'
      GTEX_LINK_CACHE_SIZE: 2000
      GTEX_LINK_CACHE_TTL: 7200
      GTEX_LINK_API_RATE_LIMIT_PER_SECOND: 5.0

    # Remove development volume mounts
    volumes: []
    ports: !reset []

    # Runtime hardening (read_only, tmpfs, cap_drop: ALL, no-new-privileges, init,
    # pids_limit) is inherited from the base docker-compose.yml so it applies to
    # every invocation. Compose *appends* list fields across -f overlays, so
    # re-declaring tmpfs/security_opt/cap_drop here would duplicate them and fail
    # validation. The base file is the single source of those controls.

    # Unified server (FastAPI on / and MCP on /mcp via the same port).
    command: ["gtex-link", "serve", "--transport", "unified", "--host", "0.0.0.0", "--port", "8000"]

    # Production resource limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
          pids: 256
        reservations:
          memory: 512M
          cpus: '0.5'

      # Production restart policy
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

    # Enhanced health check for production
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: localhost", "http://localhost:8000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

    # Production logging with rotation
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=gtex-link,environment=production"
