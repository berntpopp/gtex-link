# Production docker-compose override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  gtex-link:
    build: !reset null
    image: ${GTEX_LINK_IMAGE:?set a verified digest-addressed image}
    pull_policy: missing
    container_name: !reset null
    env_file: !reset []
    # Production-specific environment variables
    environment:
      GTEX_LINK_TRANSPORT: unified
      GTEX_LINK_LOG_LEVEL: INFO
      GTEX_LINK_LOG_FORMAT: json
      GTEX_LINK_RELOAD: "false"
      GTEX_LINK_ALLOWED_HOSTS: '["localhost","127.0.0.1","::1","gtex-link.genefoundry.org"]'
      GTEX_LINK_ALLOWED_ORIGINS: '["https://gtex-link.genefoundry.org"]'
      GTEX_LINK_CORS_ORIGINS: '["https://gtex-link.genefoundry.org"]'
      # Nested settings groups take the `__` delimiter. The single-underscore
      # spelling used here previously (GTEX_LINK_CACHE_SIZE) was silently
      # ignored, so this overlay's cache tuning never actually applied.
      GTEX_LINK_CACHE__SIZE: 2000
      GTEX_LINK_CACHE__TTL: 7200
      GTEX_LINK_API__RATE_LIMIT_PER_SECOND: 5.0
      GF_HEALTHCHECK_HOST: localhost

    # Remove development volume mounts
    volumes: !override []
    ports: !reset []
    expose:
      - "8000"

    read_only: true
    tmpfs: !override
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777
    security_opt: !override
      - no-new-privileges:true
    cap_drop: !override
      - ALL
    init: true
    pids_limit: !reset null

    command: !reset null

    # Production resource limits
    deploy: !override
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
          pids: 256
    restart: on-failure

    # Enhanced health check for production
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - 'curl -f -H "Host: $${GF_HEALTHCHECK_HOST}" http://localhost:8000/health'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Production logging with rotation
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=gtex-link,environment=production"
    networks: !reset null

networks: !reset null
