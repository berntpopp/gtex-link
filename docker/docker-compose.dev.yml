name: gtex-link-dev

services:
  gtex_link_api_dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: gtex-link-api-dev
    ports:
      - "${GTEX_LINK_HOST_PORT:-8765}:8000"
    environment:
      - GTEX_LINK_HOST=0.0.0.0
      - GTEX_LINK_PORT=8000
      - GTEX_LINK_TRANSPORT=unified
      - GTEX_LINK_MCP_PATH=/mcp
      - GTEX_LINK_LOG_LEVEL=DEBUG
      - GTEX_LINK_LOG_FORMAT=console
      - GTEX_LINK_RELOAD=true
      # Development CORS settings (more permissive). Credentials stay OFF: this
      # backend is unauthenticated (no cookies/session), and the startup guard
      # rejects a '*' origin combined with allow_credentials=true.
      - GTEX_LINK_CORS_ORIGINS=["http://localhost:3000","http://localhost:8000","http://localhost:8002","*"]
      - GTEX_LINK_CORS_ALLOW_CREDENTIALS=false
    volumes:
      # Mount source code for development (read-write for hot reload)
      - ../gtex_link:/home/app/web/gtex_link
      - ../tests:/home/app/web/tests
      - ../pyproject.toml:/home/app/web/pyproject.toml:ro
      - ../README.md:/home/app/web/README.md:ro
    command: ["gtex-link", "serve", "--transport", "unified", "--host", "0.0.0.0", "--port", "8000", "--dev"]
    user: root
    working_dir: /home/app/web
    restart: unless-stopped
    networks:
      - gtex_link_dev_network

networks:
  gtex_link_dev_network:
    driver: bridge
    name: gtex_link_dev_network
